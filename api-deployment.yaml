
version: '3.9'
services:

 postgres:
  image: postgres:15
  environment:
   POSTGRES_USER: admin
   POSTGRES_PASSWORD: admin
   POSTGRES_DB: mining
  ports:
   - "5432:5432"

 zookeeper:
  image: confluentinc/cp-zookeeper:7.0.1
  environment:
   ZOOKEEPER_CLIENT_PORT: 2181

 kafka:
  image: confluentinc/cp-kafka:7.0.1
  depends_on:
   - zookeeper
  ports:
   - "9092:9092"
  environment:
   KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
   KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
   KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

 api-gateway:
  build: ./services/api-gateway
  ports:
   - "8000:8000"
  depends_on:
   - postgres
   - kafka

 telemetry-service:
  build: ./services/telemetry-service
  depends_on:
   - kafka

 ml-service:
  build: ./services/ml-service

 billing-service:
  build: ./services/billing-service

 frontend:
  build: ./frontend
  ports:
   - "3000:3000"
  depends_on:
   - api-gateway
